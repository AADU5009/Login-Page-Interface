<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login Page</title>

  <style>
    body 
    {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2196F3, #E91E63);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container 
    {
      background-color: #fff;
      padding: 30px;
      border-radius: 8px;
      width: 340px;
      height: auto;
    }
    h2 
    {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    input[type="text"], input[type="password"] 
    {
      width: 317px;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .buttons 
    {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }
    .buttons button 
    {
      flex: 1;
      padding: 10px;
      margin: 0 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
    }
    .login-btn 
    {
      background-color: #4CAF50;
      color: white;
      width: 300px;
    }
    .login-btn:hover 
    {
      background-color: #45a049;
    }
    .extra-op
    {
      font-size: 16px;
      color: black;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form>
      <input type="text" id="user" name="username" placeholder="Username">
      <input type="password" id="pass" name="password" placeholder="Password">
      
      <div class="buttons">
        <button type="button" class="login-btn" onclick="checkLogin()">LOG IN</button>
      </div>
      <br>
      <div class="extra-op">
      <pre> <a href="#">Forgot Password?</a>   <a href="#">Create an Account</a></pre>
      </div>    
    </form>
  </div>

  <script>
    function checkLogin() {
      // 1. Get the values that the user typed in
      var usernameTyped = document.getElementById("user").value;
      var passwordTyped = document.getElementById("pass").value;

      // 2. Set the correct username and password
      var correctUser = "adarshpoduval5009";
      var correctPass = "aadu5009";

      // 3. Check if they match
      if (usernameTyped == correctUser && passwordTyped == correctPass) {
        alert("Login Successful!");
        window.location.href = "#";
      } else {
        alert("Wrong Username or Password. Try again!");
      }
    }
  </script>
</body>
</html>
